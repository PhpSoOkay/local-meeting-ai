{% extends "base.html" %}
{% block title %}Модели AI — Meeting AI{% endblock %}

{% block content %}
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-slate-500 mb-6">
        <a href="/" class="hover:text-brand-600 transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Записи
        </a>
        <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-slate-800 font-medium">Модели AI</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

        <!-- Left sidebar: defaults + add form -->
        <aside class="lg:col-span-1 space-y-4">
            <!-- Defaults -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
                <h3 class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                    По умолчанию
                </h3>
                <div>
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Суммаризация</label>
                    <select id="defaultSummarization" onchange="updateDefaults()" class="w-full mt-1 rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                        <option value="">— не выбрана —</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Транскрипция</label>
                    <select id="defaultTranscription" onchange="updateDefaults()" class="w-full mt-1 rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                        <option value="local">⚙️ Локально (faster-whisper)</option>
                    </select>
                </div>
                <button onclick="updateDefaults()" class="w-full text-sm bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 px-4 rounded-xl transition">
                    Сохранить
                </button>
            </div>

            <!-- Add model form -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
                <h3 class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Добавить модель
                </h3>
                <input type="text" id="addKey" placeholder="Ключ (например, openai-gpt4o)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <input type="text" id="addName" placeholder="Название (например, GPT-4o)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <input type="text" id="addBaseUrl" placeholder="Base URL (https://api.openai.com/v1)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <input type="text" id="addModelId" placeholder="Model ID (например, gpt-4o)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <select id="addType" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                    <option value="summarization">Суммаризация</option>
                    <option value="transcription">Транскрипция</option>
                    <option value="both">Обе</option>
                </select>
                <input type="text" id="addApiKeyEnv" placeholder="API Key ENV (например, OPENAI_API_KEY)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <input type="text" id="addApiKeyValue" placeholder="Значение API-ключа (сохранится в .env)" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200 font-mono text-xs">
                <button onclick="addModel()" class="w-full text-sm bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-xl transition">
                    Добавить
                </button>
            </div>

            <!-- .env variables status -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-2">
                <h3 class="font-semibold text-slate-800 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                    Переменные .env
                </h3>
                <div id="envVariables" class="space-y-1 text-xs">
                    <div class="text-slate-400">Загрузка…</div>
                </div>
            </div>
        </aside>

        <!-- Right: models list -->
        <section class="lg:col-span-3">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                    <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                        Все модели
                    </h2>
                    <button onclick="loadModels()" class="text-slate-400 hover:text-slate-600 transition" title="Обновить">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
                <div id="modelsList" class="divide-y divide-slate-100">
                    <div class="p-8 text-center text-slate-400 text-sm">Загрузка…</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal: edit model -->
    <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg mx-4 space-y-3 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between">
                <h3 class="font-semibold text-slate-800">Редактировать модель</h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <input type="hidden" id="editKey">
            <label class="block text-xs font-medium text-slate-500">Название</label>
            <input type="text" id="editName" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
            <label class="block text-xs font-medium text-slate-500">Base URL</label>
            <input type="text" id="editBaseUrl" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
            <label class="block text-xs font-medium text-slate-500">Model ID</label>
            <input type="text" id="editModelId" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
            <label class="block text-xs font-medium text-slate-500">Тип</label>
            <select id="editType" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
                <option value="summarization">Суммаризация</option>
                <option value="transcription">Транскрипция</option>
                <option value="both">Обе</option>
            </select>
            <label class="block text-xs font-medium text-slate-500">API Key ENV</label>
            <input type="text" id="editApiKeyEnv" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200">
            <label class="block text-xs font-medium text-slate-500">Новое значение API-ключа (оставьте пустым, чтобы не менять)</label>
            <input type="text" id="editApiKeyValue" class="w-full rounded-lg border-slate-300 text-sm py-2 px-2.5 focus:border-brand-500 focus:ring focus:ring-brand-200 font-mono text-xs" placeholder="sk-…">
            <div class="flex gap-2 pt-2">
                <button onclick="saveEdit()" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 px-4 rounded-xl transition text-sm">Сохранить</button>
                <button onclick="closeEditModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 px-4 rounded-xl transition text-sm">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Toast (уже в base.html, но js-функция showToast доступна) -->
</main>
{% endblock %}

{% block scripts %}
<script>
let modelsData = null;

// ==================== Загрузка данных ====================

async function loadModels() {
    try {
        const res = await fetch('/api/models');
        modelsData = await res.json();
        renderModels(modelsData);
        renderDefaults(modelsData);
    } catch (e) {
        document.getElementById('modelsList').innerHTML = 
            `<div class="p-8 text-center text-red-500 text-sm">Ошибка загрузки: ${escapeHtml(e.message)}</div>`;
    }
}

async function loadEnv() {
    try {
        const res = await fetch('/api/models/env');
        const data = await res.json();
        renderEnv(data);
    } catch (e) {
        document.getElementById('envVariables').innerHTML = 
            `<div class="text-red-400">Ошибка</div>`;
    }
}

// ==================== Рендеринг ====================

function renderModels(data) {
    const container = document.getElementById('modelsList');
    const models = data.models || [];
    
    if (models.length === 0) {
        container.innerHTML = `
            <div class="py-16 text-center">
                <svg class="mx-auto w-12 h-12 text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                <p class="text-slate-500 text-sm">Моделей пока нет</p>
                <p class="text-slate-400 text-xs mt-1">Добавьте первую модель через форму слева</p>
            </div>`;
        return;
    }

    const isDefaultSum = data.default_summarization;
    const isDefaultTr = data.default_transcription;

    container.innerHTML = models.map(m => {
        let statusBadge = '';
        let statusColor = '';
        if (m.key_status === 'ok') {
            statusBadge = '✓ Ключ задан';
            statusColor = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        } else if (m.key_status === 'no_key') {
            statusBadge = 'Без ключа';
            statusColor = 'bg-slate-50 text-slate-500 border-slate-200';
        } else {
            statusBadge = '✗ Нет ключа';
            statusColor = 'bg-red-50 text-red-600 border-red-200';
        }

        let typeBadge = '';
        if (m.type === 'summarization') typeBadge = 'Суммаризация';
        else if (m.type === 'transcription') typeBadge = 'Транскрипция';
        else typeBadge = 'Сумм. + Транскр.';

        const defaults = [];
        if (isDefaultSum === m.key) defaults.push('Суммаризация');
        if (isDefaultTr === m.key) defaults.push('Транскрипция');

        return `
        <div class="p-4 hover:bg-slate-50 transition group/model">
            <div class="flex items-start gap-3">
                <div class="flex-shrink-0 mt-0.5">
                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-brand-100 text-brand-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                    </span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-semibold text-slate-800 text-sm truncate">${escapeHtml(m.name)}</span>
                        ${defaults.map(d => `<span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200">⭐ ${d}</span>`).join(' ')}
                    </div>
                    <div class="text-xs text-slate-500 font-mono mb-1">${escapeHtml(m.key)}</div>
                    <div class="flex items-center gap-2 text-xs">
                        <span class="text-slate-400">${escapeHtml(m.base_url)}/${escapeHtml(m.model_id)}</span>
                    </div>
                    <div class="flex items-center gap-2 mt-1.5">
                        <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full ${statusColor}">${statusBadge}</span>
                        <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200">${typeBadge}</span>
                    </div>
                </div>
                <div class="flex-shrink-0 flex items-center gap-1">
                    <button onclick="testModel('${escapeAttr(m.key)}')" class="text-slate-300 hover:text-emerald-500 transition p-1 rounded-lg hover:bg-emerald-50" title="Тестировать">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </button>
                    <button onclick="editModel('${escapeAttr(m.key)}')" class="text-slate-300 hover:text-brand-600 transition p-1 rounded-lg hover:bg-brand-50" title="Редактировать">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                    <button onclick="deleteModel('${escapeAttr(m.key)}')" class="text-slate-300 hover:text-red-500 transition p-1 rounded-lg hover:bg-red-50" title="Удалить">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderDefaults(data) {
    // Суммаризация
    const sumSelect = document.getElementById('defaultSummarization');
    sumSelect.innerHTML = '<option value="">— не выбрана —</option>';
    (data.models || []).forEach(m => {
        if (m.type === 'summarization' || m.type === 'both') {
            const sel = m.key === data.default_summarization ? ' selected' : '';
            sumSelect.innerHTML += `<option value="${escapeAttr(m.key)}"${sel}>${escapeHtml(m.name)}</option>`;
        }
    });
    if (data.default_summarization && !(data.models || []).some(m => m.key === data.default_summarization)) {
        sumSelect.innerHTML += `<option value="${escapeAttr(data.default_summarization)}" selected>${escapeHtml(data.default_summarization)} (отсутствует)</option>`;
    }

    // Транскрипция
    const trSelect = document.getElementById('defaultTranscription');
    trSelect.innerHTML = '<option value="local"' + (data.default_transcription === 'local' ? ' selected' : '') + '>⚙️ Локально (faster-whisper)</option>';
    (data.models || []).forEach(m => {
        if (m.type === 'transcription' || m.type === 'both') {
            const sel = m.key === data.default_transcription ? ' selected' : '';
            trSelect.innerHTML += `<option value="${escapeAttr(m.key)}"${sel}>${escapeHtml(m.name)}</option>`;
        }
    });
    if (data.default_transcription && data.default_transcription !== 'local' && !(data.models || []).some(m => m.key === data.default_transcription)) {
        trSelect.innerHTML += `<option value="${escapeAttr(data.default_transcription)}" selected>${escapeHtml(data.default_transcription)} (отсутствует)</option>`;
    }
}

function renderEnv(data) {
    const container = document.getElementById('envVariables');
    const keys = Object.keys(data);
    if (keys.length === 0) {
        container.innerHTML = '<div class="text-slate-400">Нет переменных</div>';
        return;
    }
    container.innerHTML = keys.map(k => `
        <div class="flex items-center justify-between py-1">
            <span class="font-mono text-slate-600 truncate max-w-[120px]">${escapeHtml(k)}</span>
            <span class="text-slate-400 font-mono text-[10px]">${escapeHtml(data[k])}</span>
        </div>
    `).join('');
}

// ==================== Действия ====================

async function updateDefaults() {
    const sum = document.getElementById('defaultSummarization').value;
    const tr = document.getElementById('defaultTranscription').value;

    try {
        const res = await fetch('/api/models/defaults', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ default_summarization: sum, default_transcription: tr })
        });
        if (res.ok) {
            showToast('✅ Значения по умолчанию обновлены');
            loadModels();
        } else {
            const err = await res.json();
            showToast('❌ ' + (err.error || 'Ошибка'));
        }
    } catch (e) {
        showToast('❌ Ошибка: ' + e.message);
    }
}

async function addModel() {
    const key = document.getElementById('addKey').value.trim();
    const name = document.getElementById('addName').value.trim();
    const baseUrl = document.getElementById('addBaseUrl').value.trim();
    const modelId = document.getElementById('addModelId').value.trim();
    const type = document.getElementById('addType').value;
    const apiKeyEnv = document.getElementById('addApiKeyEnv').value.trim();
    const apiKeyValue = document.getElementById('addApiKeyValue').value.trim();

    if (!key || !name || !baseUrl || !modelId) {
        showToast('❌ Заполните все обязательные поля');
        return;
    }

    try {
        const res = await fetch('/api/models', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, name, base_url: baseUrl, model_id: modelId, type, api_key_env: apiKeyEnv || null, api_key_value: apiKeyValue || null })
        });
        if (res.ok) {
            showToast('✅ Модель добавлена');
            document.getElementById('addKey').value = '';
            document.getElementById('addName').value = '';
            document.getElementById('addBaseUrl').value = '';
            document.getElementById('addModelId').value = '';
            document.getElementById('addApiKeyEnv').value = '';
            document.getElementById('addApiKeyValue').value = '';
            loadModels();
            loadEnv();
        } else {
            const err = await res.json();
            showToast('❌ ' + (err.error || 'Ошибка'));
        }
    } catch (e) {
        showToast('❌ Ошибка: ' + e.message);
    }
}

function editModel(key) {
    const model = (modelsData.models || []).find(m => m.key === key);
    if (!model) return;

    document.getElementById('editKey').value = key;
    document.getElementById('editName').value = model.name || '';
    document.getElementById('editBaseUrl').value = model.base_url || '';
    document.getElementById('editModelId').value = model.model_id || '';
    document.getElementById('editType').value = model.type || 'summarization';
    document.getElementById('editApiKeyEnv').value = model.api_key_env || '';
    document.getElementById('editApiKeyValue').value = '';
    document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
}

async function saveEdit() {
    const key = document.getElementById('editKey').value;
    const name = document.getElementById('editName').value.trim();
    const baseUrl = document.getElementById('editBaseUrl').value.trim();
    const modelId = document.getElementById('editModelId').value.trim();
    const type = document.getElementById('editType').value;
    const apiKeyEnv = document.getElementById('editApiKeyEnv').value.trim();
    const apiKeyValue = document.getElementById('editApiKeyValue').value.trim();

    if (!name || !baseUrl || !modelId) {
        showToast('❌ Заполните все обязательные поля');
        return;
    }

    const body = { name, base_url: baseUrl, model_id: modelId, type, api_key_env: apiKeyEnv || null };
    if (apiKeyValue) body.api_key_value = apiKeyValue;

    try {
        const res = await fetch('/api/models/' + encodeURIComponent(key), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            showToast('✅ Модель обновлена');
            closeEditModal();
            loadModels();
            loadEnv();
        } else {
            const err = await res.json();
            showToast('❌ ' + (err.error || 'Ошибка'));
        }
    } catch (e) {
        showToast('❌ Ошибка: ' + e.message);
    }
}

async function deleteModel(key) {
    if (!confirm(`Удалить модель "${key}"?\nЕсли она используется как модель по умолчанию, значение будет сброшено.`)) return;

    try {
        const res = await fetch('/api/models/' + encodeURIComponent(key), {
            method: 'DELETE'
        });
        if (res.ok) {
            const data = await res.json();
            let msg = '✅ Модель удалена';
            if (data.reset_defaults) {
                const parts = [];
                if (data.reset_defaults.default_summarization !== undefined) parts.push('суммаризация сброшена');
                if (data.reset_defaults.default_transcription !== undefined) parts.push('транскрипция сброшена');
                if (parts.length) msg += ' (' + parts.join(', ') + ')';
            }
            showToast(msg);
            loadModels();
        } else {
            const err = await res.json();
            showToast('❌ ' + (err.error || 'Ошибка'));
        }
    } catch (e) {
        showToast('❌ Ошибка: ' + e.message);
    }
}

async function testModel(key) {
    showToast('🔄 Тестируем модель...');
    try {
        const res = await fetch('/api/models/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key })
        });
        const data = await res.json();
        if (data.success) {
            showToast('✅ Успешно! Ответ: ' + (data.response || 'OK').substring(0, 100));
        } else {
            showToast('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
        }
    } catch (e) {
        showToast('❌ Ошибка: ' + e.message);
    }
}

// ==================== Вспомогательные ====================

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function escapeAttr(text) {
    return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Закрытие модалки по Escape
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeEditModal();
});

// Закрытие модалки по клику на фон
document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
});

// ==================== Загрузка при старте ====================

loadModels();
loadEnv();
</script>
